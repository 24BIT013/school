services:
  # Django Backend with React Frontend served as static files
  - type: web
    name: school-app
    runtime: python3
    buildCommand: |
      echo "Building frontend..." &&
      cd frontend &&
      npm install &&
      npm run build &&
      echo "Copying frontend to backend..." &&
      cd .. &&
      mkdir -p backend/staticfiles &&
      cp -r frontend/dist/* backend/staticfiles/ &&
      echo "Installing Python dependencies..." &&
      cd backend &&
      pip install -r requirements.txt &&
      echo "Collecting static files..." &&
      python manage.py collectstatic --noinput --clear &&
      echo "Running migrations..." &&
      python manage.py migrate --noinput
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11
      - key: DISABLE_POETRY
        value: true

# PostgreSQL Database
databases:
  - name: school-db
    databaseName: school_db
    user: school_user
    plan: starter</content>
