services:
  # Django Backend with React Frontend served as static files
  - type: web
    name: school-app
    runtime: python3
    buildCommand: "bash build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DISABLE_POETRY
        value: true

# PostgreSQL Database
databases:
  - name: school-db
    databaseName: school_db
    user: school_user
    plan: starter
